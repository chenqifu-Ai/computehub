<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 小智助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #0f0f23; color: #e0e00; height: 100vh; display: flex; flex-direction: column; }
.header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.header h1 { font-size: 20px; }
.header h1 span { color: #7c3aed; }
.header p { font-size: 12px; color: #666; margin-top: 4px; }
.chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 0; transform: translateY(0); } }
.msg.user { align-self: flex-end; background: #2d1b69; border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: #1a1a3e; border-bottom-left-radius: 4px; }
.msg.bot.thinking { opacity: 0.6; }
.msg .label { font-size: 11px; font-weight: 600; margin-bottom: 4px; display: block; }
.msg.user .label { color: #a78bfa; }
.msg.bot .label { color: #7c3aed; }
.input-bar { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 8px; background: #0f0f23; }
.input-bar input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(124,58,237,0.3); background: rgba(255,255,255,0.04); color: #e0e00; font-size: 15px; outline: none; }
.input-bar input:focus { border-color: #7c3aed; }
.input-bar button { padding: 12px 24px; border-radius: 10px; border: none; background: #7c3aed; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.input-bar button:hover { background: #6d28d9; }
.input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
.hint { text-align: center; padding: 12px; font-size: 12px; color: #555; border-top: 1px solid rgba(255,255,255,0.03); }
</style>
</head>
<body>
<div class="header"><h1>🤖 <span>小智</span>助手</h1><p>问集群状态、查 Gallery、下发任务</p></div>
<div class="chat" id="chat">
  <div class="msg bot"><span class="label">小智</span>你好！有什么可以帮你的？</div>
</div>
<div class="input-bar">
  <input id="input" type="text" placeholder="问点什么..." autofocus>
  <button id="sendBtn" onclick="ask()">发送</button>
</div>
<div class="hint">Enter 发送 · 小智会思考并执行</div>
<script>
let sessionId = 'ai-' + Date.now();
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

async function ask() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  appendMsg("user", msg);

  const resultDiv = document.createElement("div");
  resultDiv.className = "msg bot";
  resultDiv.innerHTML = "<span class=\"label\">小智</span><div class=\"stream-content\" style=\"display:inline;\"></div>";
  chat.appendChild(resultDiv);
  const contentDiv = resultDiv.querySelector(".stream-content");

  sendBtn.disabled = true;

  try {
    const resp = await fetch("/api/v1/agent/stream", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({task: msg, session_id: sessionId})
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let full = "";

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";

      let inEvent = false;
      let evType = "";
      for (const line of lines) {
        if (line.startsWith("event: ")) {
          evType = line.slice(7).trim();
          inEvent = true;
        } else if (line.startsWith("data: ") && inEvent) {
          const data = line.slice(6).trim();
          inEvent = false;

          if (evType === "result" || evType === "thought") {
            full += data;
            contentDiv.textContent = full;
          } else if (evType === "status") {
            contentDiv.textContent = data;
          } else if (evType === "done") {
            contentDiv.textContent = full;
          }
        }
      }
    }
    chat.scrollTop = chat.scrollHeight;
  } catch(e) {
    contentDiv.textContent = "⚠️ 网络错误: " + e.message;
  }
  sendBtn.disabled = false;
  input.focus();
}

function appendMsg(role, text, thinking) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (thinking ? ' thinking' : '');
  div.innerHTML = '<span class="label">' + (role === 'user' ? '你' : '小智') + '</span>' + text.replace(/\n/g, '<br>');
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}
</script>
</body>
</html>
