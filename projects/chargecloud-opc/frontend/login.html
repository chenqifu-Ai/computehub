<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充电云 - 充电桩运营管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        .login-box {
            width: 400px;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-title {
            text-align: center;
            font-size: 24px;
            color: #1e3c72;
            margin-bottom: 30px;
        }
        .login-logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">⚡</div>
                <h2 class="login-title">充电云管理后台</h2>
                <el-form :model="form" :rules="rules" ref="loginForm">
                    <el-form-item prop="username">
                        <el-input v-model="form.username" placeholder="用户名" prefix-icon="User" size="large"></el-input>
                    </el-form-item>
                    <el-form-item prop="password">
                        <el-input v-model="form.password" type="password" placeholder="密码" prefix-icon="Lock" size="large" show-password></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="handleLogin" size="large" style="width: 100%;">登录</el-button>
                    </el-form-item>
                </el-form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.js"></script>
    <script>
        const { createApp, ref, reactive } = Vue;
        const app = createApp({
            setup() {
                const form = reactive({
                    username: '',
                    password: ''
                });
                const rules = {
                    username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                    password: [{ required: true, message: '请输入密码', trigger: 'blur' }]
                };
                const handleLogin = () => {
                    // 登录逻辑
                    localStorage.setItem('token', 'demo-token');
                    localStorage.setItem('user', JSON.stringify({ username: form.username }));
                    window.location.href = 'index.html';
                };
                return { form, rules, handleLogin };
            }
        });
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
