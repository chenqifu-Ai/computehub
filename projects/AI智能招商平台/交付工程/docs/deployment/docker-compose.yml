version: '3.8'

x-common-env: &common-env
  TZ: Asia/Shanghai
  GO_ENV: release

services:
  # ============================================================
  # API服务 (Go后端)
  # ============================================================
  api:
    build:
      context: ../../source
      dockerfile: deploy/Dockerfile.api
    restart: always
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: api
      DB_PASSWORD: ${DB_PASSWORD:-api_password_2026}
      DB_NAME: ai_zhaoshang
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_2026}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret_2026}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_me_2026}
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # AI服务 (Python)
  # ============================================================
  ai-service:
    build:
      context: ../../source
      dockerfile: deploy/Dockerfile.ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      API_ENDPOINT: http://api:8080
      MODEL_DIR: /models
      CACHE_DIR: /cache
      LOG_LEVEL: info
    volumes:
      - ai-models:/models
      - ai-cache:/cache
      - ai-logs:/app/logs
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Nginx (前端代理)
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # MySQL 8.0
  # ============================================================
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_2026}
      MYSQL_DATABASE: ai_zhaoshang
      MYSQL_USER: api
      MYSQL_PASSWORD: ${DB_PASSWORD:-api_password_2026}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --max-connections=200
      --innodb-buffer-pool-size=1G
      --slow-query-log=ON
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.d:/docker-entrypoint-initdb.d:ro
      - ./mysql/conf:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "api", "-p${DB_PASSWORD:-api_password_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # Redis 7.0
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_2026} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MinIO (对象存储)
  # ============================================================
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret_2026}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  api-logs:
    driver: local
  ai-models:
    driver: local
  ai-cache:
    driver: local
  ai-logs:
    driver: local

# .env 示例：
# DB_PASSWORD=your_secure_password_2026
# REDIS_PASSWORD=your_redis_password_2026
# MINIO_ACCESS_KEY=minioadmin
# MINIO_SECRET_KEY=your_minio_secret_2026
# JWT_SECRET=your_jwt_secret_2026
