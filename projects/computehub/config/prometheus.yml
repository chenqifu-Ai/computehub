# ==============================================================
# Prometheus 配置 — ComputeHub 监控
# ==============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ComputeHub Gateway 指标
  - job_name: 'computehub-gateway'
    static_configs:
      - targets: ['gateway:8282']
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
