name: ComputeHub CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.24'

jobs:
  # ============================================================
  # Test: Go 测试
  # ============================================================
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  # ============================================================
  # Lint: Go 代码规范检查
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ============================================================
  # Build: 全平台编译 (Gateway + TUI + Worker)
  # ============================================================
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
          - { os: windows, arch: amd64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine version
        id: version
        run: |
          VERSION="0.7.4"
          [ -f VERSION ] && VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Gateway
        env:
          GOOS: ${{ matrix.platform.os }}
          GOARCH: ${{ matrix.platform.arch }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X github.com/computehub/opc/src/version.VERSION=${{ steps.version.outputs.VERSION }}" \
            -o computehub-gateway-${{ matrix.platform.os }}-${{ matrix.platform.arch }} \
            ./cmd/gateway/

      - name: Build TUI
        env:
          GOOS: ${{ matrix.platform.os }}
          GOARCH: ${{ matrix.platform.arch }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X github.com/computehub/opc/src/version.VERSION=${{ steps.version.outputs.VERSION }}" \
            -o computehub-tui-${{ matrix.platform.os }}-${{ matrix.platform.arch }} \
            ./cmd/tui/

      - name: Build Worker
        env:
          GOOS: ${{ matrix.platform.os }}
          GOARCH: ${{ matrix.platform.arch }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X github.com/computehub/opc/src/version.VERSION=${{ steps.version.outputs.VERSION }}" \
            -o compute-worker-${{ matrix.platform.os }}-${{ matrix.platform.arch }}${{ endsWith(matrix.platform.os, 'windows') && '.exe' || '' }} \
            ./cmd/worker/

      - name: Verify binary
        run: |
          file computehub-gateway-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          ls -lh computehub-gateway-${{ matrix.platform.os }}-${{ matrix.platform.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: |
            computehub-gateway-*
            computehub-tui-*
            compute-worker-*
          retention-days: 7

  # ============================================================
  # Deploy: 生成 deploy/ 目录 (版本升级链路必需)
  # ============================================================
  deploy:
    name: Deploy (Linux ARM64)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: build/

      - name: Create deploy/ directory
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.7.4")
          mkdir -p deploy/archive

          # 复制无后缀二进制 (Gateway 升级链路硬编码这些文件名)
          cp build/binaries-linux-arm64/computehub-gateway-linux-arm64 deploy/computehub-gateway
          cp build/binaries-linux-arm64/computehub-tui-linux-arm64 deploy/computehub-tui
          cp build/binaries-linux-arm64/compute-worker-linux-arm64 deploy/compute-worker-linux-arm64

          # Windows worker 放入 windows-worker/ 子目录
          mkdir -p deploy/windows-worker
          cp build/binaries-windows-amd64/compute-worker-windows-amd64.exe deploy/windows-worker/compute-worker-win-amd64.exe

          # 写入版本号和校验和
          echo "$VERSION" > deploy/version.txt
          cd deploy
          sha256sum computehub-gateway compute-worker-linux-arm64 > sha256sums-v${VERSION}.txt
          cat sha256sums-v${VERSION}.txt

      - name: Upload deploy package
        uses: actions/upload-artifact@v4
        with:
          name: deploy-linux-arm64
          path: deploy/
          retention-days: 14

  # ============================================================
  # Release: 标签触发正式发布
  # ============================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist/

      - name: Organize release
        run: |
          mkdir release
          for dir in dist/binaries-*/; do
            cp "$dir"* release/ 2>/dev/null
          done
          cp VERSION release/ 2>/dev/null
          cd release && sha256sum * > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
