version: "3.8"

# ==============================================================
# ComputeHub — Docker Compose 部署
# 服务:
#   gateway    → REST API (Phase 1-2, 端口 8282)
#   dashboard  → 前端可视化面板 (Phase 4, 端口 8080)
#   tui        → TUI 客户端 (交互式终端)
# ==============================================================

services:
  # ---------------------------------------
  # 1. Gateway — 核心 API 服务
  #    包含: Kernel / Pipeline / Executor / GeneStore / Scheduler
  # ---------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: computehub-gateway
    ports:
      - "8282:8282"
    volumes:
      # 挂载 config + genes，修改后不用重构建
      - ./config.json:/app/config.json:ro
      - ./genes.json:/app/genes.json
      # sandbox 持久化
      - computehub-sandbox:/tmp/opc-sandbox
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - computehub-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8282/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---------------------------------------
  # 2. Dashboard — 可视化前端 (静态文件)
  #    提供 Phase 4 的全球算力地图等面板
  # ---------------------------------------
  dashboard:
    image: nginx:alpine
    container_name: computehub-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./code:/usr/share/nginx/html:ro
      - ./deploy/nginx-dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - computehub-net

  # ---------------------------------------
  # 3. TUI — 终端客户端 (按需启动)
  #    默认不自动启动，需要时 docker compose run tui
  # ---------------------------------------
  tui:
    build:
      context: .
      dockerfile: Dockerfile.tui
    container_name: computehub-tui
    stdin_open: true
    tty: true
    environment:
      - GATEWAY_URL=http://gateway:8282
      - TZ=Asia/Shanghai
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - computehub-net
    profiles:
      - tui  # 仅手动启动: docker compose --profile tui run tui

networks:
  computehub-net:
    driver: bridge

volumes:
  computehub-sandbox:
