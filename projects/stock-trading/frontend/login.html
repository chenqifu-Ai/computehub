<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易 - 量化交易系统</title>
    <link href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            width: 400px;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-top: 10px;
        }
        .login-logo .icon {
            font-size: 48px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">
                    <div class="icon">📈</div>
                    <h1>电话量化交易</h1>
                </div>
                <el-form :model="form" :rules="rules" ref="loginForm">
                    <el-form-item prop="username">
                        <el-input v-model="form.username" placeholder="用户名" prefix-icon="User" size="large"></el-input>
                    </el-form-item>
                    <el-form-item prop="password">
                        <el-input v-model="form.password" type="password" placeholder="密码" prefix-icon="Lock" size="large" show-password></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="handleLogin" size="large" style="width: 100%;">登录</el-button>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="text" @click="handleRegister" size="small">没有账号？立即注册</el-button>
                    </el-form-item>
                </el-form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.js"></script>
    <script>
        const { createApp, ref, reactive } = Vue;
        const app = createApp({
            setup() {
                const form = reactive({
                    username: 'admin',
                    password: '123456'
                });
                const rules = {
                    username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                    password: [{ required: true, message: '请输入密码', trigger: 'blur' }]
                };
                const handleLogin = () => {
                    localStorage.setItem('token', 'demo-token');
                    localStorage.setItem('user', JSON.stringify({ username: form.username }));
                    window.location.href = 'index.html';
                };
                const handleRegister = () => {
                    alert('注册功能开发中');
                };
                return { form, rules, handleLogin, handleRegister };
            }
        });
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
