syntax = "proto3";

package computehub;

option go_package = "github.com/computehub/proto";

// The Soul-Engine Nerve Center: High-speed binary communication
service ComputeHubService {
    // Bi-directional stream for real-time telemetry and command dispatch
    rpc NerveStream (stream NervePacket) returns (stream NervePacket);
    
    // One-shot admission for new nodes
    rpc AdmitNode (AdmitRequest) returns (AdmitResponse);
}

message NervePacket {
    string packet_id = 1;
    string node_id = 2;
    string fingerprint = 3;
    string token = 4;
    
    oneof payload {
        TelemetrySnapshot telemetry = 5;
        TaskCommand command = 6;
        ExecutionProof proof = 7;
        SystemEvent event = 8;
    }
}

message TelemetrySnapshot {
    float cpu_util = 1;
    float ram_used = 2;
    map<<stringstring, GpuMetric> gpus = 3;
    float network_latency = 4;
    int64 timestamp = 5;
}

message GpuMetric {
    int32 temp = 1;
    int32 utilization = 2;
    int32 mem_used = 3;
    float power_draw = 4;
}

message TaskCommand {
    string task_id = 1;
    string command_type = 2; // e.g., "START", "STOP", "PAUSE"
    string payload = 3;      // JSON config or binary data
    string expected_hash = 4;
}

message ExecutionProof {
    string task_id = 1;
    string result_hash = 2;
    bytes signature = 3;
    bytes physical_evidence = 4; // Binary snapshot of GPU state
}

message SystemEvent {
    string event_type = 1; // e.g., "CIRCUIT_BREAK", "SINKING"
    string message = 2;
    int32 severity = 3;
}

message AdmitRequest {
    string node_id = 1;
    string fingerprint = 2;
    string hardware_info_json = 3;
}

message AdmitResponse {
    bool success = 1;
    string token = 2;
    string error_msg = 3;
}
