syntax = "proto3";

package computehub;

// 算力节点状态
message NodeStatus {
    enum State {
        OFFLINE = 0;
        ONLINE = 1;
        BUSY = 2;
        MAINTENANCE = 3;
    }
    string node_id = 1;
    State state = 2;
    float cpu_utilization = 3;
    float gpu_utilization = 4;
    float memory_free_mb = 5;
    float temperature = 6;
    string hardware_fingerprint = 7;
}

// 心跳数据包 (流式推送)
message HeartbeatRequest {
    string node_id = 1;
    float utilization = 2;
    float temperature = 3;
    float memory_used_mb = 4;
    string status = 5;
}

message HeartbeatResponse {
    bool acknowledged = 1;
    string server_time = 2;
}

// 任务提交请求
message TaskRequest {
    string task_name = 1;
    float memory_mb = 2;
    int32 duration_sec = 3;
    float expected_util = 4;
    int32 priority = 5;
}

message TaskResponse {
    string task_id = 1;
    string matched_node = 2;
    string status = 3;
    string message = 4;
}

// ComputeHub 高速通信服务
service ComputeHubService {
    // 节点注册
    rpc RegisterNode(NodeStatus) returns (HeartbeatResponse);
    
    // 物理心跳流 (Bidirectional Stream)
    // 节点实时推送状态，网关实时下发指令
    rpc StreamHeartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
    
    // 任务提交 (Unary)
    rpc SubmitTask(TaskRequest) returns (TaskResponse);
}
