# ComputeHub-OPC Docker生产环境配置
# 适用于高可用性生产部署

version: '3.8'

services:
  computehub-opc:
    image: computehub/opc-server:v1.0.0
    container_name: computehub-opc-server
    ports:
      - "4840:4840"  # OPC UA通信端口
      - "8080:8080"  # 管理界面
      - "5000:5000"  # 健康检查和指标
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OPC__MaxSessions=100
      - OPC__MaxSubscriptionsPerSession=200
      - OPC__PublishingInterval=500
      - OPC__SamplingInterval=250
      - OPC__SessionTimeout=300
      - Metrics__Enabled=true
      - Metrics__Port=5000
      - Logging__File__Path=/app/logs/computehub-opc-{Date}.log
      - Logging__File__FileSizeLimitBytes=10485760
      - Logging__File__RetainedFileCountLimit=31
    volumes:
      - opc-data:/app/data
      - opc-logs:/app/logs
      - ./config/appsettings.Production.json:/app/appsettings.Production.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    networks:
      - computehub-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: computehub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - computehub-network

  # Grafana仪表板
  grafana:
    image: grafana/grafana:latest
    container_name: computehub-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=computehub2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitor/grafana-dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    networks:
      - computehub-network

  # Node Exporter (主机监控)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: computehub-node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - computehub-network

  # cAdvisor (容器监控)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: computehub-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    networks:
      - computehub-network

  # Nginx反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: computehub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - computehub-opc
    restart: unless-stopped
    networks:
      - computehub-network

volumes:
  opc-data:
    driver: local
    driver_opts:
      type: none
      device: ./data
      o: bind
  opc-logs:
    driver: local
    driver_opts:
      type: none
      device: ./logs
      o: bind
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  computehub-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# 生产环境配置说明:
# 1. 资源限制: 限制CPU和内存使用，防止单个容器耗尽资源
# 2. 健康检查: 自动监控服务状态，异常时自动重启
# 3. 数据持久化: 使用卷挂载确保数据安全
# 4. 监控集成: 完整的监控栈(Prometheus + Grafana)
# 5. 网络隔离: 使用独立网络提高安全性
# 6. SSL支持: 通过Nginx提供HTTPS终止

# 部署命令:
# docker-compose -f docker-compose.production.yml up -d

# 监控访问:
# - Prometheus: http://localhost:9090
# - Grafana: http://localhost:3000 (admin/computehub2024)
# - cAdvisor: http://localhost:8081
# - Node Exporter: http://localhost:9100

# 生产环境建议:
# 1. 配置SSL证书
# 2. 设置适当的备份策略
# 3. 配置日志轮转和归档
# 4. 设置监控告警
# 5. 定期进行安全扫描