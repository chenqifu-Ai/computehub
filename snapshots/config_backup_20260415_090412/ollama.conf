# Ollama 服务配置
# 优先级: 云端服务 > 本地服务器

[servers]
# 主要服务 (云端 - 最高优先级)
primary = "https://ollama.com"

# 备用服务 (本地服务器)
backup = "http://192.168.1.7:11434"

# 次要备用 (其他本地服务器)
secondary = "http://192.168.1.19:11434"

[settings]
# 连接超时 (秒)
timeout = 10

# 重试次数
retries = 3

# 自动故障转移
auto_failover = true

# 健康检查间隔 (秒)
health_check_interval = 60

# 首选模型
preferred_model = "qwen2.5:0.5b"

[credentials]
# API密钥 (如果使用付费服务)
api_key = "8e6253b418564cd极4b4a3428f927ee6f0.3g95X2YSoELm9knHxHN极ci1ii"

# 账号
account = "19525456@qq.com"

[monitoring]
# 启用监控
enabled = true

# 监控频率 (秒)
interval = 300

# 报警阈值 (失败次数)
alert_threshold = 3