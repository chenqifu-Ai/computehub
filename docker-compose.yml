version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: computehub-db
    environment:
      POSTGRES_USER: computehub
      POSTGRES_PASSWORD: computehub_secret
      POSTGRES_DB: computehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U computehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: computehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: computehub-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://computehub:computehub_secret@postgres:5432/computehub
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: computehub-worker
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://computehub:computehub_secret@postgres:5432/computehub
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
    command: celery -A backend.workers.tasks worker --loglevel=info

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    container_name: computehub-beat
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend.workers.tasks beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
