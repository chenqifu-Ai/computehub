# Ollama 服务配置
# 优先级: 云端服务 > 本地服务器

[servers]
# 主要服务 (本地服务 - 最高优先级)
primary = "http://127.0.0.1:11434"

# 备用服务 (云端服务)
backup = "https://ollama.com"

# 次要备用 (其他本地服务器)
secondary = "http://192.168.1.7:11434"

[settings]
# 连接超时 (秒)
timeout = 10

# 重试次数
retries = 3

# 自动故障转移
auto_failover = true

# 健康检查间隔 (秒)
health_check_interval = 60

# 首选模型 (2026-04-19更新: 从本地qwen2.5:0.5b切换到云端最新旗舰)
preferred_model = "glm-5.1"

[credentials]
# API密钥 (如果使用付费服务)
api_key = "8e6253b418564cd4b4a3428f927ee6f0.3g95X2YSoELm9knHxHNci1ii"

# 账号
account = "19525456@qq.com"

[cloud_models]
# 云端可用模型配置 (2026-04-19更新，共36个)
# 最新旗舰
flagship = "glm-5.1"           # 1404.2 GB, 2026-04-07发布

# 推荐模型
recommended = [
    "deepseek-v3.1:671b",      # 当前使用，性能稳定
    "glm-5.1",                 # 最新旗舰
    "qwen3.5:397b",           # 阿里最新
    "qwen3-coder:480b",       # 编程专用
    "gemma-4-31b",            # vLLM专用-高性能工具调用
]

# 快速响应模型
fast_response = [
    "ministral-3:3b",          # 极小模型
    "gemma3:4b",              # 边缘端模型
    "ministral-3:8b",         # 快速响应
]

# 编程专用模型
coding_models = [
    "qwen3-coder:480b",        # 编程专家
    "devstral-2:123b",         # 开发增强
    "qwen3-coder-next",       # 编程新版
]

# 多模态模型
multimodal = [
    "qwen3-vl:235b",           # 视觉模型
    "qwen3-vl:235b-instruct",  # 指令微调
]

# 深度思考模型
thinking = [
    "kimi-k2-thinking",        # 思考链增强
    "cogito-2.1:671b",        # 高级推理
    "glm-5.1",                # 旗舰逻辑
]

[monitoring]
# 启用监控
enabled = true

# 监控频率 (秒)
interval = 300

# 报警阈值 (失败次数)
alert_threshold = 3