name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, computehub-qwen3.5-397b ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests
    
    - name: Run tests
      run: |
        python -m pytest ai_agent/tests/test_qwen36_adapter.py -v
      env:
        QWEN36_API_KEY: ${{ secrets.QWEN36_API_KEY }}
        QWEN36_API_URL: ${{ secrets.QWEN36_API_URL }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install flake8
      run: pip install flake8
    - name: Lint code
      run: |
        flake8 ai_agent/config/qwen36_adapter.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 ai_agent/config/qwen36_adapter.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check for hardcoded secrets
      run: |
        echo "Checking for hardcoded secrets..."
        if grep -r "api_key.*sk-" ai_agent/config/qwen36_adapter.py; then
          echo "❌ Found hardcoded API key!"
          exit 1
        fi
        if grep -r "api_key.*sk-" ai_agent/config/*.py; then
          echo "❌ Found hardcoded API key in config files!"
          exit 1
        fi
        echo "✅ No hardcoded secrets found"

  release:
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Build package
      run: |
        pip install build twine
        python -m build
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
