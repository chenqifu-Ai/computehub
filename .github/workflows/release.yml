# =============================================================================
# ComputeHub — 自动发布工作流
# =============================================================================
# 触发方式:
#   1. push tag v* (如 v1.4.0) → 自动编译所有平台 + 创建 GitHub Release
#   2. push master → 仅编译验证（不发布）
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.4.0)'
        required: true

jobs:
  # ── 编译验证（所有 push 都跑） ──
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1 -timeout 60s

      - name: Build (linux/amd64)
        run: GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/computehub/

  # ── 跨平台编译（仅 tag 触发） ──
  release:
    name: Cross-Compile & Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
          go build -ldflags="-X github.com/computehub/opc/src/version.VERSION=${{ steps.version.outputs.VERSION }} -s -w" \
            -o "dist/computehub-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/computehub/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: computehub-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/computehub-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Generate SHA256
        run: |
          cd dist
          sha256sum computehub-${{ matrix.goos }}-${{ matrix.goarch }} \
            > computehub-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  # ── 创建 GitHub Release ──
  create-release:
    name: Create Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ComputeHub ${{ github.ref_name }}
          body_path: STD-RELEASE.md
          files: |
            dist/**/*
          generate_release_notes: true
