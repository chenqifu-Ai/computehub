name: ComputeHub CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run all tests
        run: CGO_ENABLED=0 go test -v -count=1 ./src/...

      - name: Build gateway
        run: CGO_ENABLED=0 go build -trimpath -mod=readonly -o bin/computehub-gateway main.go

      - name: Build TUI
        run: CGO_ENABLED=0 go build -trimpath -mod=readonly -o bin/computehub-tui tui.go

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
