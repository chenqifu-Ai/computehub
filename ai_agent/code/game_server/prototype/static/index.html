<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子竞技场 - 四人游戏测试</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .player-setup, .game-controls {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
        }
        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        .status {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .chat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 量子竞技场 - 四人游戏测试</h1>
        
        <div class="game-area">
            <div class="player-setup">
                <h3>玩家设置</h3>
                <input type="text" id="playerName" placeholder="输入玩家名称" value="玩家" + Math.floor(Math.random() * 1000)>
                <select id="playerClass">
                    <option value="mechanic">🧠 智械师</option>
                    <option value="assassin">⚡ 疾风刃</option>
                    <option value="guardian">🛡️ 守护者</option>
                    <option value="demolisher">💥 爆破手</option>
                </select>
                <button onclick="joinGame()">加入游戏</button>
            </div>

            <div class="game-controls">
                <h3>游戏控制</h3>
                <button onclick="sendAction('attack')">⚔️ 攻击</button>
                <button onclick="sendAction('defend')">🛡️ 防御</button>
                <button onclick="sendAction('skill')">✨ 使用技能</button>
                <button onclick="sendChat()">💬 发送聊天</button>
                <input type="text" id="chatMessage" placeholder="输入聊天内容">
            </div>
        </div>

        <div class="status">
            <h3>游戏状态</h3>
            <div id="gameStatus">未连接</div>
            <div id="roomInfo"></div>
            <div id="playerInfo"></div>
        </div>

        <div class="chat-box" id="chatBox">
            <div>欢迎来到量子竞技场！</div>
        </div>
    </div>

    <script>
        let ws = null;
        let playerId = null;
        let roomId = null;

        function joinGame() {
            const playerName = document.getElementById('playerName').value;
            const playerClass = document.getElementById('playerClass').value;
            
            playerId = 'player_' + Date.now();
            
            ws = new WebSocket('ws://localhost:8080/ws');
            
            ws.onopen = function() {
                updateStatus('已连接到游戏服务器');
                
                // 发送加入消息
                ws.send(JSON.stringify({
                    type: 'join',
                    player_id: playerId,
                    player_name: playerName,
                    player_class: playerClass
                }));
            };
            
            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
            
            ws.onclose = function() {
                updateStatus('连接已断开');
            };
        }

        function handleMessage(msg) {
            switch(msg.type) {
                case 'joined':
                    roomId = msg.room.id;
                    updateStatus('已加入房间: ' + roomId);
                    updateRoomInfo(msg.room);
                    break;
                case 'player_joined':
                    addChat('玩家 ' + msg.player.name + ' 加入了游戏');
                    updateRoomInfo(msg.room);
                    break;
                case 'chat':
                    addChat(msg.message);
                    break;
            }
        }

        function sendAction(action) {
            if (!ws) return;
            
            ws.send(JSON.stringify({
                type: 'action',
                player_id: playerId,
                action: action,
                room_id: roomId
            }));
        }

        function sendChat() {
            if (!ws) return;
            
            const message = document.getElementById('chatMessage').value;
            if (!message) return;
            
            ws.send(JSON.stringify({
                type: 'chat',
                player_id: playerId,
                message: message,
                room_id: roomId
            }));
            
            document.getElementById('chatMessage').value = '';
        }

        function updateStatus(text) {
            document.getElementById('gameStatus').textContent = text;
        }

        function updateRoomInfo(room) {
            let info = '房间玩家: ';
            room.players.forEach(player => {
                info += player.name + ' (' + player.class + '), ';
            });
            document.getElementById('roomInfo').textContent = info;
        }

        function addChat(message) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ' ' + message;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 自动生成随机玩家名
        document.getElementById('playerName').value = '玩家' + Math.floor(Math.random() * 1000);
    </script>
</body>
</html>
